<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<title>Barbearia</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>Agendar Horário</h1>

<input id="cliente" placeholder="Nome">

<input id="telefone" placeholder="Telefone">

<select id="barbeiro">

<option>João</option>

<option>Pedro</option>

</select>

<select id="servico">

<option>Corte</option>

<option>Barba</option>

<option>Corte + Barba</option>

</select>

<input id="data" type="date">

<select id="hora"></select>

<button onclick="agendar()">

Agendar

</button>

</div>

<script src="js/app.js"></script>

</body>

</html>
